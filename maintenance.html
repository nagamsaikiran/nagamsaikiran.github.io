<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Site Temporarily Unavailable - Sai Kiran</title>
    <meta name="description" content="Sai Kiran's portfolio is temporarily unavailable while updates are in progress.">
    <style>
        :root {
            color-scheme: light;
            --bg: #f8f6f1;
            --text: #111827;
            --muted: #5f6876;
            --line: #ded8cd;
            --accent: #2563eb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            background:
                linear-gradient(rgba(17, 24, 39, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(17, 24, 39, 0.035) 1px, transparent 1px),
                var(--bg);
            background-size: 36px 36px;
            color: var(--text);
        }

        main {
            width: min(680px, 100%);
            padding: 40px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.78);
            box-shadow: 0 24px 80px rgba(17, 24, 39, 0.10);
            text-align: center;
        }

        p:first-child {
            margin: 0 0 14px;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 8vw, 4.5rem);
            line-height: 0.95;
        }

        p {
            margin: 22px auto 0;
            max-width: 520px;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            margin-top: 28px;
            padding: 0 20px;
            border: 1px solid var(--line);
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
        }

        a:focus-visible {
            outline: 3px solid rgba(37, 99, 235, 0.35);
            outline-offset: 3px;
        }

        @media (max-width: 560px) {
            main {
                padding: 30px 22px;
            }
        }
    </style>
</head>
<body>
    <main>
        <p>Portfolio Update</p>
        <h1>Site temporarily unavailable</h1>
        <p>
            I am making a few updates and changes to the portfolio.
            Please check back soon.
        </p>
        <a href="https://www.linkedin.com/in/saikirannagam" target="_blank" rel="noopener noreferrer">Connect on LinkedIn</a>
    </main>
</body>
</html>
